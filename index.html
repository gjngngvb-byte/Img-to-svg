<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>HQ Hatch Studio</title>
<style>
body{
  margin:0;
  background:#0e0f14;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{margin:20px;}

.panel{
  width:90%;
  max-width:950px;
  background:#1b1c26;
  padding:15px;
  border-radius:12px;
}

canvas{
  margin-top:15px;
  max-width:100%;
  background:white;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:10px 0;
}

input, select, button{
  padding:8px;
  border-radius:8px;
  border:none;
}

button{
  background:#6c5ce7;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🖤 HQ HATCH STUDIO</h1>

<div class="panel">

  <input type="file" id="file">

  <div class="row">

    📐 Direção:
    <select id="angle">
      <option value="0">Horizontal</option>
      <option value="45">Diagonal ↗</option>
      <option value="90">Vertical</option>
      <option value="135">Diagonal ↘</option>
    </select>

    📊 Densidade:
    <input type="range" id="density" min="4" max="30" value="12">

    🧠 Estilo:
    <select id="mode">
      <option value="single">Linhas simples</option>
      <option value="cross">Cross-hatching</option>
      <option value="dynamic">Dinâmico (HQ)</option>
    </select>

    <button onclick="render()">Gerar HQ</button>
    <button onclick="download()">Baixar</button>

  </div>

  <canvas id="canvas"></canvas>
</div>

<script>

let output = null;

function loadImage(file, cb){
  const img = new Image();
  const r = new FileReader();
  r.onload = e=>{
    img.onload = ()=>cb(img);
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

// converte brilho em densidade de linhas
function getDensity(brightness){
  return 1 - (brightness / 255);
}

// desenha hachura
function drawHatch(ctx, w, h, angle, spacing, mode){

  const rad = angle * Math.PI / 180;

  const cos = Math.cos(rad);
  const sin = Math.sin(rad);

  for(let y=0; y<h; y+=spacing){
    for(let x=0; x<w; x+=spacing){

      const img = ctx.getImageData(x,y,1,1).data;
      const b = (img[0]+img[1]+img[2]) / 3;

      const d = getDensity(b);

      if(d < 0.15) continue; // branco puro → nada

      const len = d * 25; // tamanho da linha

      const x1 = x;
      const y1 = y;

      const x2 = x + cos * len;
      const y2 = y + sin * len;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
  }

  // cross-hatching (segunda camada)
  if(mode === "cross" || mode === "dynamic"){

    const angle2 = angle + 90;
    const rad2 = angle2 * Math.PI / 180;

    const cos2 = Math.cos(rad2);
    const sin2 = Math.sin(rad2);

    for(let y=0; y<h; y+=spacing*1.2){
      for(let x=0; x<w; x+=spacing*1.2){

        const img = ctx.getImageData(x,y,1,1).data;
        const b = (img[0]+img[1]+img[2]) / 3;

        const d = getDensity(b);

        if(d < 0.3) continue;

        const len = d * 18;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + cos2*len, y + sin2*len);
        ctx.stroke();
      }
    }
  }
}

function render(){

  const file = document.getElementById("file").files[0];
  if(!file) return alert("envia imagem");

  loadImage(file, img=>{

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.fillStyle="white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(img,0,0);

    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);

    // cria buffer auxiliar (não destruir original)
    const temp = document.createElement("canvas");
    temp.width = canvas.width;
    temp.height = canvas.height;

    const tctx = temp.getContext("2d");
    tctx.drawImage(img,0,0);

    ctx.strokeStyle = "black";

    const angle = parseInt(document.getElementById("angle").value);
    const spacing = parseInt(document.getElementById("density").value);
    const mode = document.getElementById("mode").value;

    drawHatch(tctx, canvas.width, canvas.height, angle, spacing, mode);

    ctx.drawImage(temp,0,0);

    output = canvas.toDataURL("image/png");
  });
}

function download(){
  if(!output) return;

  const a = document.createElement("a");
  a.href = output;
  a.download = "hq_hatching.png";
  a.click();
}

</script>

</body>
</html>
